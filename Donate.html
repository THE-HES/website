<style>
  /* ── Base ───────────────────────────────────────────────────── */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body {
    font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--fg-primary, #0D1070);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .font-display { font-family: 'League Spartan', system-ui, sans-serif; }

  /* ── Reveal on scroll ───────────────────────────────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  .reveal--in {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Focus styles ───────────────────────────────────────────── */
  :focus-visible { outline: 2px solid #F5C400; outline-offset: 2px; }

  /* ── Smooth scroll ──────────────────────────────────────────── */
  html { scroll-behavior: smooth; }

  /* ── Mega-menu stays sharp (full-width overlay) ─────────────── */
  [class~="shadow-\[0_24px_40px"] { border-radius: 0 !important; }

  /* ── CTA links / buttons ────────────────────────────────────── */
  a.inline-flex, button.inline-flex { border-radius: 8px !important; }

  /* ── Remove number input spinners ───────────────────────────── */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
