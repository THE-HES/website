  sidebarSub: { fontSize:10, color:'rgba(255,255,255,0.5)', marginTop:2, fontWeight:500, letterSpacing:0.5, textTransform:'uppercase' },
  nav: { flex:1, overflowY:'auto', padding:'12px 0' },
  navGroup: { padding:'6px 20px 2px', fontSize:9, fontWeight:700, color:'rgba(255,255,255,0.35)', letterSpacing:1.2, textTransform:'uppercase' },
  main: { flex:1, display:'flex', flexDirection:'column', overflow:'hidden' },
  topbar: { background:'#fff', borderBottom:'1px solid #E2E5EA', padding:'0 32px', height:60, display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 },
  topTitle: { fontFamily:"'League Spartan', sans-serif", fontSize:20, fontWeight:800, color:'#1A1F8F' },
  content: { flex:1, overflowY:'auto', padding:'28px 32px' },
  card: { background:'#fff', borderRadius:10, border:'1px solid #E2E5EA', padding:20, marginBottom:16 },
  label: { display:'block', fontSize:11, fontWeight:700, color:'#6B7280', textTransform:'uppercase', letterSpacing:0.8, marginBottom:4 },
  input: { width:'100%', border:'1px solid #D1D5DB', borderRadius:6, padding:'8px 10px', fontSize:13, color:'#1A1A2E', outline:'none', transition:'border 0.15s', background:'#fff' },
  textarea: { width:'100%', border:'1px solid #D1D5DB', borderRadius:6, padding:'8px 10px', fontSize:13, color:'#1A1A2E', outline:'none', resize:'vertical', minHeight:72, transition:'border 0.15s', background:'#fff' },
  row: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 },
  secHead: { fontSize:12, fontWeight:700, color:'#1A1F8F', textTransform:'uppercase', letterSpacing:0.8, borderBottom:'2px solid #F5C400', paddingBottom:6, marginBottom:14, marginTop:24 },
  btn: (color, outline) => ({
    display:'inline-flex', alignItems:'center', gap:6, padding:'8px 16px', borderRadius:6,
    fontSize:12, fontWeight:700, cursor:'pointer', border: outline ? `1.5px solid ${color}` : 'none',
    background: outline ? 'transparent' : color, color: outline ? color : '#fff',
    letterSpacing:0.3, transition:'opacity 0.15s'
  }),
  badge: (color) => ({ display:'inline-block', background: color+'18', color: color, fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, letterSpacing:0.5 }),
  eventCard: { background:'#fff', border:'1px solid #E2E5EA', borderRadius:10, overflow:'hidden', display:'flex', flexDirection:'column' },
  eventCardTop: (color) => ({ background: color, padding:'14px 16px 10px' }),
  modalOverlay: { position:'fixed', inset:0, background:'rgba(10,15,60,0.55)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, padding:20 },
  modal: { background:'#fff', borderRadius:12, width:'100%', maxWidth:640, maxHeight:'90vh', overflowY:'auto', boxShadow:'0 20px 60px rgba(0,0,0,0.25)' },
  modalHead: { padding:'20px 24px 16px', borderBottom:'1px solid #E2E5EA', position:'sticky', top:0, background:'#fff', zIndex:1 },
  toast: { position:'fixed', bottom:24, right:24, background:'#1A1F8F', color:'#fff', padding:'10px 18px', borderRadius:8, fontSize:13, fontWeight:600, zIndex:2000, boxShadow:'0 4px 20px rgba(0,0,0,0.2)', display:'flex', alignItems:'center', gap:8 }
};

// ─── NAV ITEM ─────────────────────────────────────────────────────────────────
function NavItem({ label, active, onClick, indent }) {
  return (
    <div onClick={onClick} style={{
      padding: indent ? '7px 20px 7px 32px' : '8px 20px',
      cursor:'pointer', fontSize: indent ? 12 : 13, fontWeight: active ? 700 : 500,
      color: active ? '#F5C400' : 'rgba(255,255,255,0.75)',
      background: active ? 'rgba(255,255,255,0.08)' : 'transparent',
      borderLeft: active ? '3px solid #F5C400' : '3px solid transparent',
      transition:'all 0.15s', userSelect:'none'
    }}>
      {label}
    </div>
  );
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function Toast({ msg }) {
  return <div style={S.toast}>✓ {msg}</div>;
}

// ─── FIELD ───────────────────────────────────────────────────────────────────
function Field({ label, value, onChange, multi, hint }) {
  const big = multi || (value && value.length > 80);
  return (
    <div style={{ marginBottom:12 }}>
      <label style={S.label}>{label}{hint && <span style={{ color:'#9CA3AF', fontWeight:400, textTransform:'none', letterSpacing:0, marginLeft:4 }}>— {hint}</span>}</label>
      {big
        ? <textarea style={S.textarea} value={value||''} onChange={e=>onChange(e.target.value)}
            onFocus={e=>e.target.style.border='1px solid #1A1F8F'}
            onBlur={e=>e.target.style.border='1px solid #D1D5DB'} rows={3} />
        : <input style={S.input} value={value||''} onChange={e=>onChange(e.target.value)}
            onFocus={e=>e.target.style.border='1px solid #1A1F8F'}
            onBlur={e=>e.target.style.border='1px solid #D1D5DB'} />}
    </div>
  );
}

// ─── EVENT MODAL ─────────────────────────────────────────────────────────────
function EventModal({ event, onSave, onClose }) {
  const blank = { id: uid(), name:'', date:'', time:'', location:'', format:'In-person', cost:'Free', audience:'', description:'', expires:'' };
  const [form, setForm] = useState(event ? {...event} : blank);
  const set = (k) => (v) => setForm(f => ({...f, [k]: v}));
  const isNew = !event;

  return (
    <div style={S.modalOverlay} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={S.modal}>
        <div style={S.modalHead}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontFamily:"'League Spartan', sans-serif", fontSize:18, fontWeight:800, color:'#1A1F8F' }}>{isNew ? 'Add New Event' : 'Edit Event'}</span>
            <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:'#9CA3AF', lineHeight:1 }}>×</button>
          </div>
        </div>
        <div style={{ padding:'20px 24px 24px' }}>
          <Field label="Event Name" value={form.name} onChange={set('name')} />
          <div style={S.row}>
            <Field label="Date" value={form.date} onChange={set('date')} hint="e.g. October 13, 2026" />
            <Field label="Time" value={form.time} onChange={set('time')} hint="e.g. 1:00 PM – 5:00 PM" />
          </div>
          <div style={S.row}>
            <Field label="Location" value={form.location} onChange={set('location')} />
            <div style={{ marginBottom:12 }}>
              <label style={S.label}>Format</label>
              <select style={{...S.input, height:36}} value={form.format} onChange={e=>set('format')(e.target.value)}>
                <option>In-person</option><option>Hybrid</option><option>Online / Zoom</option>
              </select>
            </div>
          </div>
          <div style={S.row}>
            <Field label="Cost / Admission" value={form.cost} onChange={set('cost')} />
            <Field label="Audience" value={form.audience} onChange={set('audience')} hint="e.g. Families and kids" />
          </div>
          <Field label="Description" value={form.description} onChange={set('description')} multi />
          <Field label="Expiry Date" value={form.expires} onChange={set('expires')} hint="YYYY-MM-DD — event hides from site after this date" />
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end', marginTop:8 }}>
            <button style={S.btn('#6B7280', true)} onClick={onClose}>Cancel</button>
            <button style={S.btn('#1A1F8F')} onClick={() => { if(form.name.trim()) onSave(form); }}>
              {isNew ? '+ Add Event' : 'Save Changes'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── EVENTS SECTION ──────────────────────────────────────────────────────────
const FORMAT_COLORS = { 'In-person': '#2AAB47', 'Hybrid': '#8E4FB8', 'Online / Zoom': '#3DB8F5' };

function EventsSection({ events, onChange, onToast }) {
  const [modal, setModal] = useState(null); // null | 'new' | event obj
  const [confirmDel, setConfirmDel] = useState(null);

  function save(form) {
    if (modal === 'new') {
      onChange([...events, form]);
      onToast('Event added');
    } else {
      onChange(events.map(e => e.id === form.id ? form : e));
      onToast('Event saved');
    }
    setModal(null);
  }

  function del(id) {
    onChange(events.filter(e => e.id !== id));
    setConfirmDel(null);
    onToast('Event deleted');
  }

  function exportCSV() {
    const cols = ['name','date','time','location','format','cost','audience','description','expires'];
    const header = cols.join(',');
    const rows = events.map(e => cols.map(c => `"${(e[c]||'').replace(/"/g,'""')}"`).join(','));
    const csv = [header, ...rows].join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'HES_Events.csv'; a.click();
  }

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <div>
          <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:22, fontWeight:800, color:'#1A1F8F' }}>Events</div>
          <div style={{ fontSize:12, color:'#6B7280', marginTop:2 }}>{events.length} event{events.length !== 1 ? 's' : ''} on the website</div>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <button style={S.btn('#6B7280', true)} onClick={exportCSV}>↓ Export CSV</button>
          <button style={S.btn('#E8363A')} onClick={() => setModal('new')}>+ Add Event</button>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:16 }}>
        {events.map(ev => (
          <div key={ev.id} style={S.eventCard}>
            <div style={{ padding:'16px 18px', borderBottom:'1px solid #F3F4F6' }}>
              <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:10 }}>
                <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:16, fontWeight:800, color:'#1A1A2E', lineHeight:1.25 }}>{ev.name}</div>
                <span style={S.badge(FORMAT_COLORS[ev.format]||'#6B7280')}>{ev.format}</span>
              </div>
            </div>
            <div style={{ padding:'12px 18px', flex:1 }}>
              <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:'4px 10px', fontSize:12, color:'#4B5563', marginBottom:10 }}>
                {ev.date && <><span style={{ color:'#9CA3AF' }}>📅</span><span>{ev.date}</span></>}
                {ev.time && <><span style={{ color:'#9CA3AF' }}>🕐</span><span>{ev.time}</span></>}
                {ev.location && <><span style={{ color:'#9CA3AF' }}>📍</span><span>{ev.location}</span></>}
                {ev.cost && <><span style={{ color:'#9CA3AF' }}>🎟</span><span>{ev.cost}</span></>}
              </div>
              {ev.description && <p style={{ fontSize:12, color:'#6B7280', lineHeight:1.5, margin:0 }}>{ev.description}</p>}
            </div>
            <div style={{ padding:'10px 18px', borderTop:'1px solid #F3F4F6', display:'flex', gap:8, background:'#FAFAFA' }}>
              <button style={{...S.btn('#1A1F8F', true), padding:'6px 12px', fontSize:11}} onClick={() => setModal(ev)}>✏ Edit</button>
              <button style={{...S.btn('#E8363A', true), padding:'6px 12px', fontSize:11}} onClick={() => setConfirmDel(ev.id)}>🗑 Delete</button>
            </div>
          </div>
        ))}
      </div>

      {events.length === 0 && (
        <div style={{ textAlign:'center', padding:'60px 0', color:'#9CA3AF' }}>
          <div style={{ fontSize:40, marginBottom:12 }}>📅</div>
          <div style={{ fontWeight:600 }}>No events yet</div>
          <div style={{ fontSize:12, marginTop:4 }}>Click "+ Add Event" to add your first one</div>
        </div>
      )}

      {(modal === 'new' || (modal && modal.id)) &&
        <EventModal event={modal === 'new' ? null : modal} onSave={save} onClose={() => setModal(null)} />}

      {confirmDel && (
        <div style={S.modalOverlay} onClick={() => setConfirmDel(null)}>
          <div style={{ background:'#fff', borderRadius:10, padding:28, maxWidth:380, width:'100%', textAlign:'center' }}>
            <div style={{ fontSize:32, marginBottom:12 }}>🗑</div>
            <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:18, fontWeight:800, marginBottom:8 }}>Delete this event?</div>
            <div style={{ fontSize:13, color:'#6B7280', marginBottom:20 }}>This cannot be undone.</div>
            <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
              <button style={S.btn('#6B7280', true)} onClick={() => setConfirmDel(null)}>Cancel</button>
              <button style={S.btn('#E8363A')} onClick={() => del(confirmDel)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PAGES SECTION ────────────────────────────────────────────────────────────
const PAGE_NAMES = Object.keys(PAGE_SCHEMAS);

function PagesSection({ pages, onChange, onToast }) {
  const [activePage, setActivePage] = useState(PAGE_NAMES[0]);
  const pageData = pages[activePage] || {};
  const schema = PAGE_SCHEMAS[activePage] || [];
  const isLong = (k) => k.includes('body') || k.includes('description') || k.includes('subtitle') || k.includes('highlight') || k.includes('intro') || k.includes('closing');

  function setField(k, v) {
    onChange({ ...pages, [activePage]: { ...pageData, [k]: v } });
  }

  return (
    <div style={{ display:'flex', gap:24 }}>
      {/* Page picker */}
      <div style={{ width:172, flexShrink:0 }}>
        <div style={{ fontSize:10, fontWeight:700, color:'#9CA3AF', textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>Pages</div>
        {PAGE_NAMES.map(p => (
          <div key={p} onClick={() => setActivePage(p)} style={{
            padding:'8px 12px', borderRadius:6, cursor:'pointer', fontSize:12, fontWeight: activePage===p ? 700 : 500,
            color: activePage===p ? '#1A1F8F' : '#4B5563', background: activePage===p ? '#EEF2FF' : 'transparent',
            marginBottom:2, transition:'all 0.12s'
          }}>{p}</div>
        ))}
      </div>

      {/* Form */}
      <div style={{ flex:1 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
          <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:22, fontWeight:800, color:'#1A1F8F' }}>{activePage}</div>
          <button style={S.btn('#2AAB47')} onClick={() => onToast('Changes auto-saved')}>✓ Saved</button>
        </div>
        {schema.map(({ section, fields }) => (
          <div key={section} style={S.card}>
            <div style={{ fontSize:11, fontWeight:700, color:'#1A1F8F', textTransform:'uppercase', letterSpacing:0.9, borderBottom:'2px solid #F5C400', paddingBottom:6, marginBottom:16 }}>{section}</div>
            {fields.map(([key, label]) => (
              <Field key={key} label={label} value={pageData[key]||''} onChange={v => setField(key, v)} multi={isLong(key)} />
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── PROGRAMS SECTION ─────────────────────────────────────────────────────────
function ProgramsSection({ programs, onChange, onToast }) {
  const [editing, setEditing] = useState(null);
  const [draft, setDraft] = useState('');

  function startEdit(p) { setEditing(p.id); setDraft(p.description); }
  function saveEdit(p) {
    onChange(programs.map(pr => pr.id === p.id ? {...pr, description: draft} : pr));
    setEditing(null); onToast('Program updated');
  }

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:22, fontWeight:800, color:'#1A1F8F' }}>Programs</div>
        <div style={{ fontSize:12, color:'#6B7280', marginTop:2 }}>Edit descriptions — program names, ages, and schedules are managed in the codebase.</div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:16 }}>
        {programs.map(p => (
          <div key={p.id} style={{ ...S.card, borderLeft:`4px solid ${p.color}`, padding:0, overflow:'hidden' }}>
            <div style={{ padding:'14px 16px 10px', borderBottom:'1px solid #F3F4F6' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:10, height:10, borderRadius:'50%', background:p.color, flexShrink:0 }}></div>
                <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:16, fontWeight:800, color:'#1A1A2E' }}>{p.name}</div>
              </div>
              <div style={{ fontSize:11, color:'#9CA3AF', marginTop:4, paddingLeft:20 }}>Ages {p.ages} · {p.schedule}</div>
            </div>
            <div style={{ padding:'12px 16px' }}>
              {editing === p.id ? (
                <div>
                  <textarea style={{...S.textarea, fontSize:12, minHeight:60}} value={draft} onChange={e=>setDraft(e.target.value)} />
                  <div style={{ display:'flex', gap:8, marginTop:6 }}>
                    <button style={{...S.btn('#1A1F8F'), padding:'5px 12px', fontSize:11}} onClick={() => saveEdit(p)}>Save</button>
                    <button style={{...S.btn('#6B7280', true), padding:'5px 12px', fontSize:11}} onClick={() => setEditing(null)}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div>
                  <p style={{ fontSize:12, color:'#4B5563', lineHeight:1.55, marginBottom:10 }}>{p.description}</p>
                  <div style={{ marginBottom:8 }}>
                    {p.subPrograms.map((sp,i) => <div key={i} style={{ fontSize:11, color:'#6B7280', padding:'2px 0' }}>· {sp}</div>)}
                  </div>
                  <button style={{...S.btn('#1A1F8F', true), padding:'5px 12px', fontSize:11}} onClick={() => startEdit(p)}>✏ Edit Description</button>
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ORG INFO SECTION ─────────────────────────────────────────────────────────
function OrgSection({ org, onChange, onToast }) {
  const sections = [
    { title:'Identity', fields:[['name','Legal Name'],['nickname','Short Name / Abbreviation'],['type','Organization Type'],['founded','Founded Year'],['tagline','Tagline'],['mission','Mission Phrase']] },
    { title:'Contact & Location', fields:[['address','Address'],['phone','Phone'],['email','Email'],['website','Website']] },
    { title:'Hours', fields:[['hours_weekdays','Weekday Hours'],['hours_sunday','Sunday Hours']] },
    { title:'Partners & Stats', fields:[['partner','Partner Organization'],['stat_1_num','Stat 1 Number'],['stat_1_label','Stat 1 Label'],['stat_2_num','Stat 2 Number'],['stat_2_label','Stat 2 Label'],['stat_3_num','Stat 3 Number'],['stat_3_label','Stat 3 Label']] }
  ];

  function set(k, v) { onChange({...org, [k]:v}); }

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
        <div style={{ fontFamily:"'League Spartan', sans-serif", fontSize:22, fontWeight:800, color:'#1A1F8F' }}>Organization Info</div>
        <button style={S.btn('#2AAB47')} onClick={() => onToast('Org info saved')}>✓ Saved</button>
      </div>
      {sections.map(({ title, fields }) => (
        <div key={title} style={S.card}>
          <div style={{ fontSize:11, fontWeight:700, color:'#1A1F8F', textTransform:'uppercase', letterSpacing:0.9, borderBottom:'2px solid #F5C400', paddingBottom:6, marginBottom:16 }}>{title}</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {fields.map(([k,label]) => (
              <div key={k} style={{ gridColumn: k === 'address' ? 'span 2' : 'auto' }}>
                <Field label={label} value={org[k]||''} onChange={v => set(k,v)} />
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useData();
  const [section, setSection] = useState('events');
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2200);
  }

  const navItems = [
    { id:'events', label:'Events' },
    { id:'programs', label:'Programs' },
    { id:'pages', label:'Page Content', group:'Pages' },
    { id:'org', label:'Org Info', group:'Settings' }
  ];

  const sectionTitles = { events:'Events', programs:'Programs', pages:'Page Content', org:'Org Info' };

  return (
    <div style={S.app}>
      {/* Sidebar */}
      <div style={S.sidebar}>
        <div style={S.sidebarHeader}>
          <div style={S.sidebarLogo}>H·E·S</div>
          <div style={S.sidebarSub}>Content Manager</div>
        </div>
        <div style={S.nav}>
          {navItems.map((item, i) => {
            const prev = navItems[i-1];
            const showGroup = item.group && (!prev || prev.group !== item.group);
            return (
              <div key={item.id}>
                {showGroup && <div style={S.navGroup}>{item.group}</div>}
                <NavItem label={item.label} active={section===item.id} onClick={() => setSection(item.id)} />
              </div>
            );
          })}
        </div>
        <div style={{ padding:'16px 20px', borderTop:'1px solid rgba(255,255,255,0.1)', fontSize:10, color:'rgba(255,255,255,0.3)', lineHeight:1.5 }}>
          Changes save automatically<br/>to this browser's memory.
        </div>
      </div>

      {/* Main */}
      <div style={S.main}>
        <div style={S.topbar}>
          <div style={S.topTitle}>{sectionTitles[section]}</div>
          <div style={{ fontSize:11, color:'#9CA3AF', fontWeight:500 }}>
            thehes.org · Content Manager
          </div>
        </div>
        <div style={S.content}>
          {section === 'events' &&
            <EventsSection events={data.events}
              onChange={ev => setData(d => ({...d, events:ev}))}
              onToast={showToast} />}
          {section === 'programs' &&
            <ProgramsSection programs={data.programs}
              onChange={pr => setData(d => ({...d, programs:pr}))}
              onToast={showToast} />}
          {section === 'pages' &&
            <PagesSection pages={data.pages}
              onChange={pg => setData(d => ({...d, pages:pg}))}
              onToast={showToast} />}
          {section === 'org' &&
            <OrgSection org={data.org}
              onChange={o => setData(d => ({...d, org:o}))}
              onToast={showToast} />}
        </div>
      </div>

      {toast && <Toast msg={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
