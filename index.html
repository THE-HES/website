<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>H.E.S. — YOUR Community Center | Brooklyn, NY</title>

<!-- Fonts: League Spartan (Title) + Montserrat (Gotham substitute) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

<!-- Supabase Client Library (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Your Supabase Credentials Configuration -->
<script src="supabase-config.js"></script>

<!-- H.E.S. design system tokens -->
<link rel="stylesheet" href="assets/colors_and_type.css" />

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['League Spartan', 'system-ui', 'sans-serif'],
          body:    ['Montserrat', 'system-ui', 'sans-serif'],
        },
        colors: {
          'hes-blue':        '#1A1F8F',
          'hes-blue-dark':   '#0D1070',
          'hes-blue-mid':    '#2A35C7',
          'hes-yellow':      '#F5C400',
          'hes-yellow-dark': '#C39A00',
          'hes-red':         '#E8363A',
          'hes-orange':      '#F26522',
          'hes-green':       '#2AAB47',
          'hes-off-white':   '#F8F7F2',
        },
      },
    },
  };
</script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body {
    font-family: 'Montserrat', system-ui, sans-serif;
    color: var(--fg-primary, #0D1070);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .font-display { font-family: 'League Spartan', system-ui, sans-serif; }
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  .reveal--in { opacity: 1; transform: translateY(0); }
  @keyframes tile-in {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  html[data-tiles-per-row="3"] section#programs .grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  @media (min-width: 768px) {
    html[data-tiles-per-row="3"] section#programs .grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }
  html[data-dots="0"] [style*="radial-gradient(circle, #F5C400"] { display: none !important; }
  html[data-impact="0"] [data-screen-label="Stats Block"] .relative.grid.md\:grid-cols-3:last-child { display: none; }
  html[data-hero-accent="white"] [data-screen-label="Hero"] h1 span span { color: #ffffff !important; }
  html[data-cta-style="yellow"] a.bg-\[color\:var\(--hes-blue\)\] { background-color: var(--hes-yellow) !important; color: var(--hes-blue) !important; }
  html[data-cta-style="yellow"] a.bg-\[color\:var\(--hes-blue\)\]:hover { background-color: #ffffff !important; }
  :focus-visible { outline: 2px solid var(--hes-yellow); outline-offset: 2px; }
</style>
</head>
